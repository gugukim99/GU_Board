<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작업 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
  header { background: #24292e; color: #fff; padding: 16px 24px; font-size: 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
  .header-user { font-size: 14px; color: #aaa; }
  .logout-btn { font-size: 13px; background: #444; color: #fff; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; margin-left: 10px; }
  .container { max-width: 900px; margin: 30px auto; padding: 0 16px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 24px; }

  /* 로그인 화면 */
  #login-screen { max-width: 400px; margin: 80px auto; }
  #login-screen h2 { font-size: 20px; margin-bottom: 8px; }
  #login-screen p { font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.6; }
  #login-screen input { width: 100%; padding: 10px 12px; border: 1px solid #d0d7de; border-radius: 6px; font-size: 14px; margin-bottom: 10px; }
  #login-screen button { width: 100%; padding: 10px; background: #24292e; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
  #login-screen button:hover { background: #444; }
  .login-error { color: #cf222e; font-size: 13px; margin-top: 8px; display: none; }
  .login-link { font-size: 12px; color: #0969da; margin-top: 12px; display: block; text-align: center; }

  /* 달력 */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-header h2 { font-size: 18px; }
  .cal-header button { background: #0969da; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 14px; }
  .cal-header button:hover { background: #0752a3; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-label { text-align: center; font-size: 12px; font-weight: bold; color: #888; padding: 4px 0; }
  .cal-day-label:first-child { color: #e03e3e; }
  .cal-day-label:last-child { color: #0969da; }
  .cal-cell { min-height: 52px; border-radius: 8px; padding: 6px; cursor: pointer; transition: background 0.15s; position: relative; background: #f6f8fa; }
  .cal-cell:hover { background: #dbeafe; }
  .cal-cell.empty { background: transparent; cursor: default; }
  .cal-cell.today { background: #0969da; color: #fff; font-weight: bold; }
  .cal-cell.today:hover { background: #0752a3; }
  .cal-cell.has-task::after { content: ''; display: block; width: 6px; height: 6px; background: #f59e0b; border-radius: 50%; position: absolute; bottom: 5px; right: 5px; }
  .cal-cell.today.has-task::after { background: #fff; }
  .cal-cell.selected { outline: 2px solid #f59e0b; }
  .day-num { font-size: 13px; }

  /* 할 일 */
  .task-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .task-header h2 { font-size: 16px; }
  .selected-date-label { font-size: 13px; color: #0969da; font-weight: bold; }
  .task-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .task-input-row input { flex: 1; padding: 8px 12px; border: 1px solid #d0d7de; border-radius: 6px; font-size: 14px; }
  .task-input-row button { background: #2da44e; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 14px; }
  .task-list { list-style: none; }
  .task-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; background: #f6f8fa; margin-bottom: 6px; }
  .task-item input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
  .task-item span { flex: 1; font-size: 14px; }
  .task-item.done span { text-decoration: line-through; color: #aaa; }
  .task-item button { background: none; border: none; color: #cf222e; cursor: pointer; font-size: 16px; }
  .empty-msg { text-align: center; color: #aaa; font-size: 14px; padding: 20px 0; }
  .progress-bar { background: #e2e8f0; border-radius: 99px; height: 10px; margin-top: 14px; }
  .progress-fill { height: 10px; border-radius: 99px; background: #2da44e; transition: width 0.3s; }
  .progress-label { font-size: 12px; color: #666; margin-top: 6px; text-align: right; }
  .status { text-align: center; font-size: 13px; color: #888; margin-bottom: 10px; min-height: 20px; }
  .status.error { color: #cf222e; }
  .status.ok { color: #2da44e; }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen" class="card">
  <h2>🔐 대시보드 로그인</h2>
  <p>GitHub Personal Access Token과 Gist ID를 입력하세요.<br>입력 정보는 이 브라우저에만 저장됩니다.</p>
  <input id="input-token" type="password" placeholder="GitHub Token (ghp_...)">
  <input id="input-gist" type="text" placeholder="Gist ID">
  <button onclick="doLogin()">로그인</button>
  <div class="login-error" id="login-error">❌ 토큰 또는 Gist ID가 올바르지 않아요.</div>
  <a class="login-link" href="https://gist.github.com" target="_blank">Gist 만들러 가기 →</a>
</div>

<!-- 대시보드 화면 -->
<div id="dashboard-screen" style="display:none">
  <header>
    📋 나의 작업 대시보드
    <div style="display:flex;align-items:center">
      <span class="header-user" id="header-user"></span>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </header>
  <div class="container">
    <div class="card">
      <div class="cal-header">
        <button onclick="changeMonth(-1)">◀ 이전</button>
        <h2 id="cal-title"></h2>
        <button onclick="changeMonth(1)">다음 ▶</button>
      </div>
      <div class="cal-grid" id="cal-grid">
        <div class="cal-day-label">일</div>
        <div class="cal-day-label">월</div>
        <div class="cal-day-label">화</div>
        <div class="cal-day-label">수</div>
        <div class="cal-day-label">목</div>
        <div class="cal-day-label">금</div>
        <div class="cal-day-label">토</div>
      </div>
    </div>
    <div class="card">
      <div class="task-header">
        <h2>✅ 할 일 목록</h2>
        <span class="selected-date-label" id="selected-date-label"></span>
      </div>
      <div class="status" id="status"></div>
      <div class="task-input-row">
        <input id="task-input" type="text" placeholder="할 일을 입력하세요..." onkeydown="if(event.key==='Enter')addTask()">
        <button onclick="addTask()">추가</button>
      </div>
      <ul class="task-list" id="task-list"></ul>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">진행률 0%</div>
    </div>
  </div>
</div>

<script>
  const FILENAME = 'dashboard.json';
  const today = new Date();
  let cur = new Date(today.getFullYear(), today.getMonth(), 1);
  let selectedDate = formatDate(today);
  let tasks = {};
  let TOKEN = '', GIST_ID = '';

  function formatDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function formatLabel(str) {
    const [y,m,d] = str.split('-');
    return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
  }
  function setStatus(msg, type='') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  // 로그인
  async function doLogin() {
    TOKEN = document.getElementById('input-token').value.trim();
    GIST_ID = document.getElementById('input-gist').value.trim();
    if (!TOKEN || !GIST_ID) return;
    try {
      const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        headers: { Authorization: `token ${TOKEN}` }
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      const content = data.files[FILENAME]?.content;
      if (content) tasks = JSON.parse(content);
      // 사용자 정보
      const userRes = await fetch('https://api.github.com/user', {
        headers: { Authorization: `token ${TOKEN}` }
      });
      const user = await userRes.json();
      document.getElementById('header-user').textContent = `👤 ${user.login}`;
      // 화면 전환
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard-screen').style.display = 'block';
      document.getElementById('login-error').style.display = 'none';
      selectDate(selectedDate);
    } catch(e) {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function doLogout() {
    TOKEN = ''; GIST_ID = ''; tasks = {};
    document.getElementById('input-token').value = '';
    document.getElementById('input-gist').value = '';
    document.getElementById('login-screen').style.display = 'block';
    document.getElementById('dashboard-screen').style.display = 'none';
  }

  async function saveToGist() {
    setStatus('저장 중...', '');
    try {
      await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        method: 'PATCH',
        headers: { Authorization: `token ${TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ files: { [FILENAME]: { content: JSON.stringify(tasks) } } })
      });
      setStatus('✅ 저장 완료!', 'ok');
    } catch(e) {
      setStatus('❌ 저장 실패', 'error');
    }
  }

  function renderCalendar() {
    const grid = document.getElementById('cal-grid');
    grid.querySelectorAll('.cal-cell').forEach(c => c.remove());
    document.getElementById('cal-title').textContent = `${cur.getFullYear()}년 ${cur.getMonth()+1}월`;
    const firstDay = new Date(cur.getFullYear(), cur.getMonth(), 1).getDay();
    const daysInMonth = new Date(cur.getFullYear(), cur.getMonth()+1, 0).getDate();
    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div'); el.className = 'cal-cell empty'; grid.appendChild(el);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = formatDate(new Date(cur.getFullYear(), cur.getMonth(), d));
      const el = document.createElement('div');
      el.className = 'cal-cell';
      if (dateStr === formatDate(today)) el.classList.add('today');
      if (dateStr === selectedDate) el.classList.add('selected');
      if (tasks[dateStr]?.length > 0) el.classList.add('has-task');
      el.innerHTML = `<div class="day-num">${d}</div>`;
      el.onclick = () => selectDate(dateStr);
      grid.appendChild(el);
    }
  }

  function selectDate(dateStr) {
    selectedDate = dateStr;
    document.getElementById('selected-date-label').textContent = formatLabel(dateStr);
    renderCalendar(); renderTasks();
  }

  function changeMonth(dir) {
    cur = new Date(cur.getFullYear(), cur.getMonth() + dir, 1);
    renderCalendar();
  }

  function addTask() {
    const inp = document.getElementById('task-input');
    const text = inp.value.trim();
    if (!text) return;
    if (!tasks[selectedDate]) tasks[selectedDate] = [];
    tasks[selectedDate].push({ text, done: false });
    inp.value = '';
    renderCalendar(); renderTasks(); saveToGist();
  }

  function toggleTask(i) {
    tasks[selectedDate][i].done = !tasks[selectedDate][i].done;
    renderCalendar(); renderTasks(); saveToGist();
  }

  function deleteTask(i) {
    tasks[selectedDate].splice(i, 1);
    renderCalendar(); renderTasks(); saveToGist();
  }

  function renderTasks() {
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    const arr = tasks[selectedDate] || [];
    if (arr.length === 0) {
      list.innerHTML = '<div class="empty-msg">등록된 할 일이 없어요 😊</div>';
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('progress-label').textContent = '진행률 0%';
      return;
    }
    arr.forEach((t, i) => {
      const li = document.createElement('li');
      li.className = 'task-item' + (t.done ? ' done' : '');
      li.innerHTML = `
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})">
        <span>${t.text}</span>
        <button onclick="deleteTask(${i})">✕</button>
      `;
      list.appendChild(li);
    });
    const done = arr.filter(t => t.done).length;
    const pct = Math.round(done / arr.length * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent = `진행률 ${pct}% (${done}/${arr.length})`;
  }
</script>
</body>
</html>
